<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>PMO Prazos · Layout 3 — Radar</title>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
:root{--bg:#060912;--s1:#0a0f1c;--s2:#0f1525;--b1:#182038;--b2:#1e2a45;--red:#f0455a;--orange:#f97316;--yellow:#eab308;--green:#10d98a;--blue:#3b82f6;--text:#c8d4ef;--muted:#3d5070;--accent:#10d98a;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'Manrope',sans-serif;min-height:100vh;}
body::after{content:'';position:fixed;top:0;right:0;width:600px;height:600px;background:radial-gradient(circle,rgba(16,217,138,.04) 0%,transparent 70%);pointer-events:none;}

header{padding:18px 40px;display:flex;align-items:center;justify-content:space-between;}
.brand{font-size:14px;font-weight:800;letter-spacing:-.3px;}
.brand span{color:var(--accent);}
.header-controls{display:flex;align-items:center;gap:10px;}
.upd-badge{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--muted);padding:4px 10px;border:1px solid var(--b1);border-radius:4px;}
.btn-r{padding:7px 16px;border-radius:8px;border:1px solid var(--b2);background:transparent;color:var(--muted);font-size:12px;cursor:pointer;font-family:'Manrope',sans-serif;transition:all .2s;}
.btn-r:hover{border-color:var(--accent);color:var(--accent);}

main{max-width:1320px;margin:0 auto;padding:0 40px 40px;}

/* Hero KPIs */
.hero{display:grid;grid-template-columns:repeat(4,1fr);gap:2px;margin-bottom:20px;border-radius:12px;overflow:hidden;border:1px solid var(--b1);}
.hero-kpi{background:var(--s1);padding:16px 24px;cursor:pointer;transition:background .2s;position:relative;}
.hero-kpi:not(:last-child)::after{content:'';position:absolute;right:0;top:20%;bottom:20%;width:1px;background:var(--b1);}
.hero-kpi:hover{background:var(--s2);}
.hero-kpi.active{background:var(--s2);}
.hero-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
.hero-icon{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px;}
.hero-icon.red{background:rgba(240,69,90,.12);}
.hero-icon.orange{background:rgba(249,115,22,.12);}
.hero-icon.yellow{background:rgba(234,179,8,.12);}
.hero-icon.green{background:rgba(16,217,138,.12);}
.hero-pct{font-size:10px;font-family:'IBM Plex Mono',monospace;padding:2px 6px;border-radius:4px;}
.hero-num{font-size:36px;font-weight:800;line-height:1;letter-spacing:-1px;font-family:'IBM Plex Mono',monospace;}
.hero-kpi.red .hero-num{color:var(--red);}
.hero-kpi.orange .hero-num{color:var(--orange);}
.hero-kpi.yellow .hero-num{color:var(--yellow);}
.hero-kpi.green .hero-num{color:var(--green);}
.hero-lbl{font-size:10px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.08em;margin-top:3px;}

/* Main grid */
.main-grid{display:grid;grid-template-columns:1fr 300px;gap:20px;}

/* Table style */
.table-wrap{background:var(--s1);border:1px solid var(--b1);border-radius:14px;overflow:hidden;}
.table-header{display:grid;grid-template-columns:1.2fr 90px 280px 120px;padding:10px 20px;border-bottom:1px solid var(--b1);background:var(--s2);}
.th{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);}
.table-body{}
.table-row{display:grid;grid-template-columns:1.2fr 90px 280px 120px;padding:16px 20px;border-bottom:1px solid var(--b1);align-items:center;transition:background .15s;}
.table-row:last-child{border-bottom:none;}
.table-row:hover{background:var(--s2);}
.row-status{display:flex;align-items:center;gap:8px;}
.status-pip{width:6px;height:6px;border-radius:50%;flex-shrink:0;}
.status-pip.red{background:var(--red);box-shadow:0 0 4px var(--red);}
.status-pip.orange{background:var(--orange);box-shadow:0 0 4px var(--orange);}
.status-pip.yellow{background:var(--yellow);}
.status-pip.green{background:var(--green);}
.row-name{font-size:14px;font-weight:700;margin-bottom:2px;}
.row-gp{font-size:12px;color:var(--muted);}
.td{font-size:13px;font-family:'IBM Plex Mono',monospace;color:var(--muted);}
.td-gp{color:var(--green);font-weight:700;font-size:14px;}
.td-artia{color:var(--yellow);font-weight:700;font-size:14px;}
.td-badge{display:inline-block;padding:4px 10px;border-radius:20px;font-size:11px;font-weight:700;}
.td-badge.red{background:rgba(240,69,90,.12);color:var(--red);}
.td-badge.orange{background:rgba(249,115,22,.12);color:var(--orange);}
.td-badge.yellow{background:rgba(234,179,8,.12);color:var(--yellow);}
.td-badge.green{background:rgba(16,217,138,.12);color:var(--green);}
.td-diff{font-size:10px;}
.dual-bar-wrap{display:flex;flex-direction:column;gap:5px;}
.dual-bar-labels{display:flex;justify-content:space-between;align-items:center;margin-bottom:2px;}
.dual-bar-label-gp{font-size:12px;font-weight:700;font-family:'IBM Plex Mono',monospace;}
.dual-bar-label-artia{font-size:12px;font-weight:700;font-family:'IBM Plex Mono',monospace;color:var(--yellow);}
.dual-bar-track{position:relative;height:14px;background:var(--b1);border-radius:7px;overflow:hidden;}
.dual-bar-artia{position:absolute;top:0;left:0;height:14px;border-radius:7px;background:rgba(234,179,8,.2);transition:width .8s ease;}
.dual-bar-gp{position:absolute;top:2px;left:0;height:10px;border-radius:5px;transition:width .8s ease;}
.dual-bar-diff-label{font-size:12px;font-weight:700;font-family:'IBM Plex Mono',monospace;display:inline-block;margin-top:3px;padding:2px 8px;border-radius:4px;}
.td-diff.behind{color:var(--red);}
.td-diff.ahead{color:var(--green);}
.td-diff.equal{color:var(--muted);}

/* Side panel */
.side-panel{}
.side-card{background:var(--s1);border:1px solid var(--b1);border-radius:14px;padding:18px;margin-bottom:12px;}
.side-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);margin-bottom:14px;}
.donut-wrap{display:flex;flex-direction:column;align-items:center;gap:16px;}
.donut-center-wrap{position:relative;width:120px;height:120px;}
.donut-center-wrap svg{width:120px;height:120px;}
.donut-center-text{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;}
.donut-center-num{font-size:26px;font-weight:800;font-family:'IBM Plex Mono',monospace;color:var(--text);line-height:1;}
.donut-center-lbl{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;}
.donut-legend{display:grid;grid-template-columns:1fr 1fr;gap:8px 16px;width:100%;}
.dl-item{display:flex;align-items:center;gap:6px;font-size:11px;}
.dl-dot{width:8px;height:8px;border-radius:2px;flex-shrink:0;}
.dl-label{color:var(--muted);flex:1;}
.dl-val{font-family:'IBM Plex Mono',monospace;font-weight:700;}

.rank-list{display:flex;flex-direction:column;gap:6px;max-height:320px;overflow-y:auto;padding-right:4px;scrollbar-width:thin;scrollbar-color:var(--b2) transparent;}
.rank-item{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:8px;background:var(--s2);border:1px solid var(--b1);transition:all .15s;}
.rank-item:hover{border-color:var(--b2);}
.rank-num{font-size:11px;font-family:'IBM Plex Mono',monospace;color:var(--muted);width:16px;flex-shrink:0;text-align:center;}
.rank-info{flex:1;min-width:0;}
.rank-name{font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.rank-bar-wrap{margin-top:4px;position:relative;}
.rank-bar-bg{height:5px;background:var(--b1);border-radius:3px;}
.rank-bar-fill{height:5px;border-radius:3px;transition:width .8s ease;}
.rank-pct{font-size:12px;font-weight:700;font-family:'IBM Plex Mono',monospace;flex-shrink:0;width:36px;text-align:right;}

.loading{text-align:center;padding:60px;color:var(--muted);}
.donut-tooltip{position:fixed;background:var(--s2);border:1px solid var(--b2);border-radius:8px;padding:8px 12px;font-size:12px;font-weight:700;pointer-events:none;z-index:999;display:none;white-space:nowrap;box-shadow:0 4px 16px rgba(0,0,0,.4);}
@keyframes donutIn{from{transform:rotate(-90deg) scale(.8);opacity:0;}to{transform:rotate(0deg) scale(1);opacity:1;}}
.donut-animated{animation:donutIn .6s ease forwards;}
.donut-path{cursor:pointer;transition:opacity .2s;}
.donut-path:hover{opacity:1!important;filter:brightness(1.2);}
.spinner{width:28px;height:28px;border:2px solid var(--b1);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 12px;}
@keyframes spin{to{transform:rotate(360deg);}}
.search-bar-wrap{padding:12px 16px;border-bottom:1px solid var(--b1);display:flex;align-items:center;gap:10px;background:var(--s2);}
.search-bar-wrap svg{color:var(--muted);flex-shrink:0;}
.search-input{background:transparent;border:none;outline:none;color:var(--text);font-family:'Manrope',sans-serif;font-size:13px;flex:1;}
.search-input::placeholder{color:var(--muted);}
.search-clear{background:none;border:none;color:var(--muted);cursor:pointer;font-size:14px;padding:0;line-height:1;}
.search-clear:hover{color:var(--text);}
.empty{padding:32px;text-align:center;color:var(--muted);font-size:12px;}
</style>
</head>
<body>
<header>
  <div class="brand">Grupo <span>DB</span> · PMO Prazos</div>
  <div class="header-controls">
    <span class="upd-badge" id="upd"></span>
    <button class="btn-r" onclick="load()">↻ Atualizar</button>
  </div>
</header>
<main>
  <div id="loading" class="loading"><div class="spinner"></div>Carregando...</div>
  <div id="content" style="display:none">
    <div class="hero">
      <div class="hero-kpi red" onclick="filtrar('atrasado')">
        <div class="hero-top"><div class="hero-icon red">⚠</div></div>
        <div class="hero-num" id="nA">0</div>
        <div class="hero-lbl">Atrasados</div>
      </div>
      <div class="hero-kpi orange" onclick="filtrar('risco')">
        <div class="hero-top"><div class="hero-icon orange">⚡</div></div>
        <div class="hero-num" id="nR">0</div>
        <div class="hero-lbl">Risco de atraso</div>
      </div>
      <div class="hero-kpi yellow" onclick="filtrar('atencao')">
        <div class="hero-top"><div class="hero-icon yellow">◷</div></div>
        <div class="hero-num" id="nV">0</div>
        <div class="hero-lbl">Vencem em 30d</div>
      </div>
      <div class="hero-kpi green" onclick="filtrar('ok')">
        <div class="hero-top"><div class="hero-icon green">✓</div></div>
        <div class="hero-num" id="nO">0</div>
        <div class="hero-lbl">No prazo</div>
      </div>
    </div>
    <div class="main-grid">
      <div class="table-wrap">
        <div class="search-bar-wrap">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
          <input class="search-input" id="searchInput" type="text" placeholder="Buscar projeto..." oninput="filtrarBusca()"/>
          <button class="search-clear" onclick="limparBusca()">✕</button>
        </div>
        <div class="table-header">
          <div class="th">Projeto</div>
          <div class="th">Término</div>
          <div class="th">Progresso GP vs Artia</div>
          <div class="th">Status</div>
        </div>
        <div class="table-body" id="tableBody"></div>
      </div>
      <div class="side-panel">
        <div class="side-card">
          <div class="side-title">Distribuição do portfólio</div>
          <div class="donut-wrap">
            <div class="donut-center-wrap">
              <svg id="donutSvg" viewBox="0 0 120 120"></svg>
              <div class="donut-center-text">
                <div class="donut-center-num" id="donutTotal">0</div>
                <div class="donut-center-lbl">projetos</div>
              </div>
            </div>
            <div class="donut-legend" id="donutLegend"></div>
          </div>
        </div>
        <div class="side-card">
          <div class="side-title">Ranking · % Conclusão GP</div>
          <div class="rank-list" id="miniList"></div>
        </div>
      </div>
    </div>
  </div>
</main>
<div class="donut-tooltip" id="donutTooltip"></div>
<script>
const WORKER='https://pmo-monitor.vitormanu-dl05.workers.dev';
let allData={atrasado:[],risco:[],atencao:[],ok:[]};
let filtroAtivo=null;

async function load(){
  document.getElementById('loading').style.display='block';
  document.getElementById('content').style.display='none';
  try{
    const[rP,rPj]=await Promise.all([fetch(`${WORKER}/prazos`).then(r=>r.json()),fetch(`${WORKER}/projetos`).then(r=>r.json())]);
    const det=await Promise.all(rPj.map(p=>fetch(`${WORKER}/debug/${p.id}`).then(r=>r.json())));
    const todosProj=det.filter(d=>d.id);
    const dbg={};todosProj.forEach(p=>{dbg[String(p.id)]=p;});
    const atrasados=rP.filter(p=>p.status==='atrasado');
    const risco=rP.filter(p=>p.status==='atencao'&&p.diferenca_percent!==undefined);
    const atencao=rP.filter(p=>p.status==='atencao'&&p.diferenca_percent===undefined);
    const ids=new Set(rP.map(p=>String(p.id)));
    const ok=todosProj.filter(p=>p.estimated_end&&!ids.has(String(p.id))).map(p=>({...p,dias:Math.ceil((new Date(p.estimated_end+'T00:00:00')-new Date())/(1000*60*60*24)),status:'ok'}));
    [...atrasados,...risco,...atencao].forEach(p=>{const d=dbg[String(p.id)];if(d){p.percent_complete=d.percent_complete??null;p.percent_complete_estimated=d.percent_complete_estimated??null;}});
    allData={atrasado:atrasados,risco,atencao,ok};
    document.getElementById('nA').textContent=atrasados.length;
    document.getElementById('nR').textContent=risco.length;
    document.getElementById('nV').textContent=atencao.length;
    document.getElementById('nO').textContent=ok.length;
    document.getElementById('upd').textContent=new Date().toLocaleTimeString('pt-BR');
    renderTable();
    renderDonut(atrasados.length,risco.length,atencao.length,ok.length);
    renderMini([...atrasados,...risco,...atencao,...ok]);
    document.getElementById('loading').style.display='none';
    document.getElementById('content').style.display='block';
  }catch(e){document.getElementById('loading').innerHTML=`<div style="color:var(--red)">Erro: ${e.message}</div>`;}
}

function renderTable(){
  const listas=filtroAtivo?[{lista:allData[filtroAtivo],cls:filtroAtivo}]:[{lista:allData.atrasado,cls:'red'},{lista:allData.risco,cls:'orange'},{lista:allData.atencao,cls:'yellow'},{lista:allData.ok,cls:'green'}];
  const el=document.getElementById('tableBody');
  let html='';
  listas.forEach(({lista,cls})=>{
    lista.forEach(p=>{
      const pG=p.percent_complete!=null?Number(p.percent_complete):null;
      const pA=p.percent_complete_estimated!=null?Number(p.percent_complete_estimated):null;
      const dataFmt=p.estimated_end?new Date(p.estimated_end+'T12:00:00').toLocaleDateString('pt-BR'):'—';
      const diasLbl=p.dias<0?`${Math.abs(p.dias)}d atrasado`:p.dias===0?'Hoje':`${p.dias}d rest.`;
      let diffCls='equal',diffTxt='=';
      if(pG!==null&&pA!==null){const d=pG-pA;diffCls=d>0.5?'ahead':d<-0.5?'behind':'equal';diffTxt=d>0.5?`▲${Math.abs(d).toFixed(1)}%`:d<-0.5?`▼${Math.abs(d).toFixed(1)}%`:'=';}
      const gpColor=pG!==null?(pG>=80?'var(--green)':pG>=50?'var(--yellow)':'var(--orange)'):'var(--green)';
      const dualBar=pG!==null||pA!==null?`
        <div class="dual-bar-wrap">
          <div class="dual-bar-labels">
            <span class="dual-bar-label-gp" style="color:${gpColor}">GP ${pG!==null?pG.toFixed(1)+'%':'—'}</span>
            <span class="dual-bar-label-artia">Artia ${pA!==null?pA.toFixed(1)+'%':'—'}</span>
          </div>
          <div class="dual-bar-track">
            ${pA!==null?`<div class="dual-bar-artia" style="width:${Math.min(pA,100)}%"></div>`:''}
            ${pG!==null?`<div class="dual-bar-gp" style="width:${Math.min(pG,100)}%;background:${gpColor}"></div>`:''}
          </div>
          ${pG!==null&&pA!==null?`<div class="dual-bar-diff-label" style="color:${diffCls==='behind'?'var(--red)':diffCls==='ahead'?'var(--green)':'var(--muted)'}">${diffTxt}</div>`:''}
        </div>`:'—';
      html+=`<div class="table-row">
        <div><div class="row-status"><div class="status-pip ${cls}"></div><div><div class="row-name">${p.nome}</div><div class="row-gp">${p.gp||'—'}</div></div></div></div>
        <div class="td">${dataFmt}</div>
        <div>${dualBar}</div>
        <div><div class="td-badge ${cls}">${diasLbl}</div></div>
      </div>`;
    });
  });
  el.innerHTML=html||`<div class="empty">Nenhum projeto</div>`;
}

function renderDonut(a,r,v,o){
  const total=a+r+v+o||1;
  const segs=[
    {v:a,c:'#f0455a',label:'Atrasados',tipo:'atrasado'},
    {v:r,c:'#f97316',label:'Risco',tipo:'risco'},
    {v:v,c:'#eab308',label:'30 dias',tipo:'atencao'},
    {v:o,c:'#10d98a',label:'No prazo',tipo:'ok'}
  ];
  const R=46,cx=60,cy=60,strokeW=14;
  let angle=-90;
  const tip=document.getElementById('donutTooltip');
  
  // Animação: começa com sweep=0 e expande
  const svg=document.getElementById('donutSvg');
  svg.innerHTML=`<circle cx="${cx}" cy="${cy}" r="${R}" fill="var(--s2)"/>`;
  
  let delay=0;
  segs.forEach(s=>{
    const pct=s.v/total;
    const sweep=pct*360;
    if(sweep<1){angle+=sweep;return;}
    const gap=1.5;
    const a1=(angle+gap)*Math.PI/180,a2=(angle+sweep-gap)*Math.PI/180;
    const x1=cx+R*Math.cos(a1),y1=cy+R*Math.sin(a1);
    const x2=cx+R*Math.cos(a2),y2=cy+R*Math.sin(a2);
    const lg=sweep>180?1:0;
    const Ri=R-strokeW;
    const xi1=cx+Ri*Math.cos(a1),yi1=cy+Ri*Math.sin(a1);
    const xi2=cx+Ri*Math.cos(a2),yi2=cy+Ri*Math.sin(a2);
    const path=document.createElementNS('http://www.w3.org/2000/svg','path');
    path.setAttribute('d',`M ${x1} ${y1} A ${R} ${R} 0 ${lg} 1 ${x2} ${y2} L ${xi2} ${yi2} A ${Ri} ${Ri} 0 ${lg} 0 ${xi1} ${yi1} Z`);
    path.setAttribute('fill',s.c);
    path.setAttribute('opacity','0');
    path.classList.add('donut-path');
    path.style.transition=`opacity .3s ease ${delay}s`;
    path.addEventListener('mouseenter',e=>{
      tip.style.display='block';
      tip.style.color=s.c;
      tip.textContent=`${s.label}: ${s.v} (${Math.round(pct*100)}%)`;
    });
    path.addEventListener('mousemove',e=>{
      tip.style.left=(e.clientX+12)+'px';
      tip.style.top=(e.clientY-30)+'px';
    });
    path.addEventListener('mouseleave',()=>{tip.style.display='none';});
    path.addEventListener('click',()=>{filtrar(s.tipo);});
    svg.appendChild(path);
    setTimeout(()=>{path.setAttribute('opacity','0.9');},50+delay*1000);
    delay+=0.1;
    angle+=sweep;
  });
  
  document.getElementById('donutTotal').textContent=total;
  const labels=[['Atrasados',a,'#f0455a','atrasado'],['Risco',r,'#f97316','risco'],['30 dias',v,'#eab308','atencao'],['No prazo',o,'#10d98a','ok']];
  document.getElementById('donutLegend').innerHTML=labels.map(([l,n,c,t])=>`<div class="dl-item" style="cursor:pointer" onclick="filtrar('${t}')"><div class="dl-dot" style="background:${c}"></div><span class="dl-label">${l}</span><span class="dl-val" style="color:${c}">${n}</span></div>`).join('');
}

function renderMini(lista){
  // Ordena pelos mais problemáticos: maior diferença Artia - GP primeiro
  const comPct=lista.filter(p=>p.percent_complete!=null&&p.percent_complete_estimated!=null)
    .sort((a,b)=>{
      const diffA=Number(a.percent_complete_estimated)-Number(a.percent_complete);
      const diffB=Number(b.percent_complete_estimated)-Number(b.percent_complete);
      return diffB-diffA;
    });
  document.getElementById('miniList').innerHTML=comPct.map((p,i)=>{
    const pct=Number(p.percent_complete);
    const pctArtia=Number(p.percent_complete_estimated);
    const diff=pctArtia-pct;
    // Cor baseada na diferença (gravidade)
    const cor=diff>30?'var(--red)':diff>15?'var(--orange)':diff>5?'var(--yellow)':'var(--green)';
    const nome=(p.nome||'').replace('Projeto ','');
    return`<div class="rank-item">
      <span class="rank-num">${i+1}</span>
      <div class="rank-info">
        <div class="rank-name">${nome}</div>
        <div class="rank-bar-wrap"><div class="rank-bar-bg"><div class="rank-bar-fill" style="width:${Math.min(pct,100)}%;background:${cor}"></div></div></div>
      </div>
      <span class="rank-pct" style="color:${cor}">${pct.toFixed(0)}%</span>
    </div>`;
  }).join('');
}

function filtrarBusca(){
  const q=document.getElementById('searchInput').value.toLowerCase().trim();
  document.querySelectorAll('.table-row').forEach(row=>{
    row.style.display=row.textContent.toLowerCase().includes(q)?'':'none';
  });
}
function limparBusca(){
  document.getElementById('searchInput').value='';
  document.querySelectorAll('.table-row').forEach(row=>{row.style.display='';});
}
function filtrar(tipo){
  filtroAtivo=filtroAtivo===tipo?null:tipo;
  document.querySelectorAll('.hero-kpi').forEach(k=>k.classList.remove('active'));
  if(filtroAtivo){const m={atrasado:0,risco:1,atencao:2,ok:3};document.querySelectorAll('.hero-kpi')[m[filtroAtivo]]?.classList.add('active');}
  renderTable();
}
load();
</script>
