<!DOCTYPE html>
<html lang="pt-BR" translate="no">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>PMO Prazos · DB Diagnósticos</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg: #0b0e14;
    --surface: #111520;
    --border: #1e2535;
    --red: #ff4d4d;
    --red-dim: rgba(255,77,77,0.12);
    --yellow: #f5c842;
    --yellow-dim: rgba(245,200,66,0.12);
    --green: #00e5a0;
    --green-dim: rgba(0,229,160,0.10);
    --text: #e8eaf0;
    --muted: #5a6278;
    --accent: #00e5a0;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Background grid */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,229,160,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,229,160,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  /* Header */
  header {
    position: relative;
    z-index: 10;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 20px 40px;
    border-bottom: 1px solid var(--border);
    background: rgba(11,14,20,0.9);
    backdrop-filter: blur(12px);
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .logo-badge {
    width: 38px;
    height: 38px;
    background: linear-gradient(135deg, #00e5a0, #00b5ae);
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    font-weight: 800;
    color: #0b0e14;
  }

  .logo-text { font-size: 15px; font-weight: 700; letter-spacing: 0.02em; }
  .logo-sub { font-size: 11px; color: var(--muted); font-weight: 400; letter-spacing: 0.08em; text-transform: uppercase; }

  .header-right { display: flex; gap: 10px; align-items: center; }

  .btn {
    padding: 8px 18px;
    border-radius: 8px;
    border: none;
    cursor: pointer;
    font-family: 'Syne', sans-serif;
    font-size: 13px;
    font-weight: 600;
    transition: all 0.2s;
  }

  .btn-ghost {
    background: transparent;
    color: var(--muted);
    border: 1px solid var(--border);
  }
  .btn-ghost:hover { color: var(--text); border-color: var(--muted); }

  .btn-primary {
    background: var(--accent);
    color: #0b0e14;
  }
  .btn-primary:hover { opacity: 0.85; }

  /* Main */
  main {
    position: relative;
    z-index: 1;
    max-width: 1100px;
    margin: 0 auto;
    padding: 48px 40px;
  }

  /* KPI strip */
  .kpi-strip {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 16px;
    margin-bottom: 40px;
  }

  .kpi {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 22px 26px;
    display: flex;
    align-items: center;
    gap: 18px;
    transition: border-color 0.2s;
  }

  .kpi:hover { border-color: var(--muted); }

  .kpi-icon {
    width: 44px;
    height: 44px;
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    flex-shrink: 0;
  }

  .kpi-icon.red { background: var(--red-dim); }
  .kpi-icon.yellow { background: var(--yellow-dim); }
  .kpi-icon.green { background: var(--green-dim); }

  .kpi-num {
    font-size: 32px;
    font-weight: 800;
    line-height: 1;
  }

  .kpi-num.red { color: var(--red); }
  .kpi-num.yellow { color: var(--yellow); }
  .kpi-num.green { color: var(--green); }

  .kpi-label { font-size: 12px; color: var(--muted); margin-top: 4px; text-transform: uppercase; letter-spacing: 0.06em; }

  /* Section header */
  .section-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
  }

  .section-title {
    font-size: 13px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--muted);
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .section-title::before {
    content: '';
    display: block;
    width: 3px;
    height: 14px;
    border-radius: 2px;
  }

  .section-title.red::before { background: var(--red); }
  .section-title.yellow::before { background: var(--yellow); }

  /* Cards */
  .cards { display: flex; flex-direction: column; gap: 10px; margin-bottom: 40px; }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 18px 24px;
    display: grid;
    grid-template-columns: 1fr auto auto;
    align-items: center;
    gap: 20px;
    transition: all 0.2s;
    animation: fadeIn 0.4s ease forwards;
    opacity: 0;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .card:hover { border-color: var(--muted); transform: translateX(4px); }
  .card.red { border-left: 3px solid var(--red); }
  .card.yellow { border-left: 3px solid var(--yellow); }

  .card-name { font-size: 15px; font-weight: 600; margin-bottom: 4px; }
  .card-gp { font-size: 12px; color: var(--muted); }

  .card-date {
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    color: var(--muted);
    text-align: right;
  }

  .badge {
    padding: 5px 12px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 700;
    white-space: nowrap;
  }

  .badge.red { background: var(--red-dim); color: var(--red); }
  .badge.yellow { background: var(--yellow-dim); color: var(--yellow); }

  /* Empty state */
  .empty {
    text-align: center;
    padding: 40px;
    color: var(--muted);
    font-size: 14px;
    background: var(--surface);
    border: 1px dashed var(--border);
    border-radius: 12px;
  }

  /* Loading */
  .loading {
    text-align: center;
    padding: 60px;
    color: var(--muted);
    font-size: 14px;
  }

  .spinner {
    width: 32px;
    height: 32px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 16px;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* Modal */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(4px);
    z-index: 100;
    align-items: center;
    justify-content: center;
  }

  .modal-overlay.open { display: flex; }

  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 32px;
    width: 100%;
    max-width: 520px;
    animation: modalIn 0.2s ease;
  }

  @keyframes modalIn {
    from { opacity: 0; transform: scale(0.96); }
    to { opacity: 1; transform: scale(1); }
  }

  .modal h2 { font-size: 18px; font-weight: 700; margin-bottom: 24px; }

  .form-group { margin-bottom: 16px; }
  .form-group label { display: block; font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 6px; }

  .form-group input, .form-group select {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 14px;
    color: var(--text);
    font-family: 'Syne', sans-serif;
    font-size: 14px;
    transition: border-color 0.2s;
  }

  .form-group input:focus, .form-group select:focus {
    outline: none;
    border-color: var(--accent);
  }

  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

  .modal-footer { display: flex; gap: 10px; justify-content: flex-end; margin-top: 24px; }

  .msg { font-size: 13px; color: var(--accent); margin-top: 12px; min-height: 20px; }

  /* Last update */
  .last-update {
    text-align: right;
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 32px;
    font-family: 'DM Mono', monospace;
  }

  /* Tab nav */
  .tabs { display: flex; gap: 4px; margin-bottom: 32px; }
  .tab {
    padding: 8px 20px;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    border: 1px solid transparent;
    transition: all 0.2s;
    background: transparent;
    color: var(--muted);
    font-family: 'Syne', sans-serif;
  }
  .tab.active { background: var(--surface); border-color: var(--border); color: var(--text); }
  .tab:hover:not(.active) { color: var(--text); }

  /* Admin panel */
  #adminPanel { display: none; }
  #adminPanel.open { display: block; }

  .admin-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }

  .admin-table th {
    text-align: left;
    padding: 10px 16px;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--muted);
    border-bottom: 1px solid var(--border);
  }

  .admin-table td {
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    vertical-align: middle;
  }

  .admin-table tr:last-child td { border-bottom: none; }
  .admin-table tr:hover td { background: rgba(255,255,255,0.02); }

  .admin-table input[type="date"] {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 6px 10px;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 12px;
  }

  .admin-table input[type="date"]:focus { outline: none; border-color: var(--accent); }

  .btn-save-row {
    padding: 5px 12px;
    border-radius: 6px;
    border: none;
    background: var(--green-dim);
    color: var(--green);
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    font-family: 'Syne', sans-serif;
    transition: all 0.2s;
  }

  .btn-save-row:hover { background: var(--accent); color: #0b0e14; }

  .admin-wrap {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    overflow: hidden;
  }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-badge">DB</div>
    <div>
      <div class="logo-text">Grupo DB</div>
      <div class="logo-sub">PMO · Prazos</div>
    </div>
  </div>
  <div class="header-right">
    <button class="btn btn-ghost" onclick="load()">↻ Atualizar</button>
    <button class="btn btn-primary" onclick="openModal()">+ Cadastrar projeto</button>
  </div>
</header>

<main>
  <div class="tabs">
    <button class="tab active" onclick="switchTab('dashboard')">Dashboard</button>
    <button class="tab" onclick="switchTab('admin')">Gerenciar prazos</button>
  </div>

  <!-- Dashboard -->
  <div id="dashPanel">
    <div id="loading" class="loading">
      <div class="spinner"></div>
      Carregando projetos...
    </div>

    <div id="content" style="display:none">
      <div class="last-update" id="lastUpdate"></div>

      <div class="kpi-strip">
        <div class="kpi">
          <div class="kpi-icon red">⚠</div>
          <div>
            <div class="kpi-num red" id="kpiAtrasados">0</div>
            <div class="kpi-label">Atrasados</div>
          </div>
        </div>
        <div class="kpi">
          <div class="kpi-icon yellow">◷</div>
          <div>
            <div class="kpi-num yellow" id="kpiAtencao">0</div>
            <div class="kpi-label">Vencem em 30 dias</div>
          </div>
        </div>
        <div class="kpi">
          <div class="kpi-icon green">✓</div>
          <div>
            <div class="kpi-num green" id="kpiOk">0</div>
            <div class="kpi-label">No prazo</div>
          </div>
        </div>
      </div>

      <div class="section-header">
        <div class="section-title red">Atrasados</div>
      </div>
      <div class="cards" id="listaAtrasados"></div>

      <div class="section-header">
        <div class="section-title yellow">Atenção · Vencem em 30 dias</div>
      </div>
      <div class="cards" id="listaAtencao"></div>
    </div>
  </div>

  <!-- Admin -->
  <div id="adminPanel">
    <div class="admin-wrap">
      <table class="admin-table" translate="no">
        <thead>
          <tr>
            <th>Projeto</th>
            <th>Gestor de Projetos</th>
            <th>Término Estimado</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="adminBody"></tbody>
      </table>
    </div>
  </div>
</main>

<!-- Modal cadastro -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <h2>Cadastrar projeto</h2>
    <div class="form-row">
      <div class="form-group">
        <label>ID do projeto (Artia)</label>
        <input type="text" id="fId" placeholder="ex: 6350986"/>
      </div>
      <div class="form-group">
        <label>Término estimado</label>
        <input type="date" id="fEnd"/>
      </div>
    </div>
    <div class="form-group">
      <label>Nome do projeto</label>
      <input type="text" id="fNome" placeholder="ex: Projeto DB Next"/>
    </div>
    <div class="form-group">
      <label>Gestor de Projetos</label>
      <input type="text" id="fGp" placeholder="ex: Guilherme Fabre"/>
    </div>
    <div class="msg" id="modalMsg"></div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" onclick="cadastrar()">Salvar</button>
    </div>
  </div>
</div>

<script>
const WORKER = 'https://pmo-monitor.vitormanu-dl05.workers.dev';
let todosProj = [];

async function load() {
  document.getElementById('loading').style.display = 'block';
  document.getElementById('content').style.display = 'none';

  try {
    // Busca prazos atrasados/atenção
    const [rPrazos, rProjetos] = await Promise.all([
      fetch(`${WORKER}/prazos`).then(r => r.json()),
      fetch(`${WORKER}/projetos`).then(r => r.json()),
    ]);

    // Busca detalhes de todos os projetos para o admin e KPI "ok"
    const detalhes = await Promise.all(
      rProjetos.map(p => fetch(`${WORKER}/debug/${p.id}`).then(r => r.json()))
    );

    todosProj = detalhes.filter(d => d.id);

    const atrasados = rPrazos.filter(p => p.status === 'atrasado');
    const atencao = rPrazos.filter(p => p.status === 'atencao');
    const okCount = todosProj.filter(p => p.estimated_end).length - atrasados.length - atencao.length;

    document.getElementById('kpiAtrasados').textContent = atrasados.length;
    document.getElementById('kpiAtencao').textContent = atencao.length;
    document.getElementById('kpiOk').textContent = Math.max(0, okCount);

    renderCards('listaAtrasados', atrasados, 'red');
    renderCards('listaAtencao', atencao, 'yellow');
    renderAdmin(todosProj);

    const agora = new Date().toLocaleString('pt-BR');
    document.getElementById('lastUpdate').textContent = `Última atualização: ${agora}`;

    document.getElementById('loading').style.display = 'none';
    document.getElementById('content').style.display = 'block';
  } catch(e) {
    document.getElementById('loading').innerHTML = `<div style="color:var(--red)">Erro ao carregar dados.<br><small>${e.message}</small></div>`;
  }
}

function renderCards(elId, lista, tipo) {
  const el = document.getElementById(elId);
  if (!lista.length) {
    el.innerHTML = `<div class="empty">Nenhum projeto ${tipo === 'red' ? 'atrasado' : 'a vencer em breve'} 🎉</div>`;
    return;
  }
  el.innerHTML = lista.map((p, i) => {
    const diasLabel = p.dias < 0
      ? `${Math.abs(p.dias)} dias atrasado`
      : `Vence em ${p.dias} dias`;
    const dataFmt = p.estimated_end ? new Date(p.estimated_end + 'T12:00:00').toLocaleDateString('pt-BR') : '—';
    return `
      <div class="card ${tipo}" style="animation-delay:${i * 0.06}s">
        <div>
          <div class="card-name">${p.nome}</div>
          <div class="card-gp">Gestor: ${p.gp || '—'}</div>
        </div>
        <div class="card-date">${dataFmt}</div>
        <div class="badge ${tipo}">${diasLabel}</div>
      </div>`;
  }).join('');
}

function renderAdmin(projetos) {
  const tbody = document.getElementById('adminBody');
  if (!projetos.length) {
    tbody.innerHTML = `<tr><td colspan="4" style="text-align:center;color:var(--muted);padding:30px">Nenhum projeto cadastrado</td></tr>`;
    return;
  }
  tbody.innerHTML = projetos.map(p => {
    const endVal = p.estimated_end || '';
    return `
      <tr>
        <td>${p.nome || p.id}</td>
        <td style="color:var(--muted)">${p.gp || '—'}</td>
        <td><input type="date" id="date_${p.id}" value="${endVal}"/></td>
        <td><button class="btn-save-row" onclick="salvarPrazo('${p.id}','${p.nome}','${p.gp}')">Salvar</button></td>
      </tr>`;
  }).join('');
}

async function salvarPrazo(id, nome, gp) {
  const val = document.getElementById(`date_${id}`).value;
  const r = await fetch(`${WORKER}/projetos`, {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({ id, nome, gp, estimated_end: val })
  });
  if (r.ok) {
    const btn = document.querySelector(`button[onclick="salvarPrazo('${id}','${nome}','${gp}')"]`);
    btn.textContent = '✓ Salvo';
    setTimeout(() => { btn.textContent = 'Salvar'; load(); }, 1500);
  }
}

function switchTab(tab) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  event.target.classList.add('active');
  document.getElementById('dashPanel').style.display = tab === 'dashboard' ? 'block' : 'none';
  document.getElementById('adminPanel').className = tab === 'admin' ? 'open' : '';
}

function openModal() { document.getElementById('modalOverlay').classList.add('open'); }
function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
  document.getElementById('modalMsg').textContent = '';
  ['fId','fNome','fGp','fEnd'].forEach(id => document.getElementById(id).value = '');
}

async function cadastrar() {
  const id = document.getElementById('fId').value.trim();
  const nome = document.getElementById('fNome').value.trim();
  const gp = document.getElementById('fGp').value.trim();
  const estimated_end = document.getElementById('fEnd').value;
  const msg = document.getElementById('modalMsg');

  if (!id || !nome || !gp) { msg.textContent = 'Preencha ID, nome e GP.'; return; }

  msg.textContent = 'Salvando...';
  const r = await fetch(`${WORKER}/projetos`, {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({ id, nome, gp, estimated_end })
  });

  if (r.ok) {
    msg.textContent = '✓ Projeto cadastrado!';
    setTimeout(() => { closeModal(); load(); }, 1000);
  } else {
    msg.textContent = 'Erro ao cadastrar.';
  }
}

load();
</script>
</body>
</html>
